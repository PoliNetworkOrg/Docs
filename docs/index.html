<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>PoliNetwork Docs</title>
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
	<meta name="description" content="Description">
	<meta name="viewport"
		content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
	<meta name="keywords" content="doc,docs,documentation,gitbook,creator,generator,github,jekyll,github-pages">
	<meta name="description" content="PoliNetwork Docs">
	<meta name="viewport"
		content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
	<link rel="stylesheet" href="./style.css" title="docsify-darklight-theme" type="text/css" />
	<link rel="icon" href="/icon.png">
</head>

<body>
	<div id="app"></div>
	<script>
		window.$docsify = {
			search: 'auto',
			name: 'PoliNetwork Docs',
			search: {
				noData: {
					'/': 'No results!'
				},
				paths: 'auto',
				placeholder: {
					'/': 'Search'
				}
			},
			plugins: [
				function (hook) {
					var footer = [
						'<footer style="text-align: center;margin-top: calc(75px + 3vw + 3vh);">',
						'<hr />',
						'<span id="copyright"> <a href="https://polinetwork.org">PoliNetwork</a> Docs  &copy; 2022 </span>',
						'</footer>'
					].join('');

					hook.afterEach(function (html) {
						return html + footer;
					});
				}
			],
		}
	</script>
	<script>document.getElementById('copyright').appendChild(document.createTextNode(new Date().getFullYear()))</script>
	<script src="//unpkg.com/docsify/lib/docsify.min.js"></script>
	<script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
	<script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js" type="text/javascript">
	</script>
</body>

</html>
